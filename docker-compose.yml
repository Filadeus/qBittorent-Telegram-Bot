version: '3.8'

services:
  qbittorrent-bot:
    image: ghcr.io/filadeus/qbittorent-telegram-bot:latest
    build: .
    container_name: qbittorrent-telegram-bot
    restart: unless-stopped
    volumes:
      - bot-data:/app/data
    environment:
      - SQLITE_DB_PATH=/app/data/bot_data.db
    env_file:
      - .env

volumes:
  bot-data:
